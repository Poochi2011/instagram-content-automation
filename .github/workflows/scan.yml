name: Instagram scan

on:
  schedule:
    # Every 3 hours, not hourly -- hourly meant 11 accounts x 24 checks/day
    # through one proxy identity, which correlated with every account hitting
    # a login wall (see CONTEXT.md, 2026-07-11). Lower volume + per-group
    # identity rotation (scraper/proxy_rotation.py) are the mitigation.
    - cron: "0 */3 * * *"
  workflow_dispatch: {} # adds a "Run workflow" button in the Actions tab

permissions:
  contents: write # needed to commit the updated database/downloads back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tesseract OCR
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Firefox system dependencies (for Camoufox)
        run: python -m playwright install-deps firefox

      - name: Cache Camoufox browser binary
        # ~530MB and versioned by the installed camoufox package, so this only
        # actually re-downloads when requirements.txt bumps the camoufox pin.
        uses: actions/cache@v4
        with:
          path: ~/.cache/camoufox
          key: camoufox-bin-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Fetch Camoufox browser binary (no-op if cache hit)
        run: python -m camoufox fetch

      - name: Run check (scrape new posts)
        env:
          # Scraping is anonymous (Camoufox renders real logged-out browser
          # pages) -- no Instagram login/session needed. Routes through a
          # residential proxy since GitHub's shared runner IPs get flagged by
          # Instagram at the request level regardless of auth.
          SCRAPER_PROXY_URL: ${{ secrets.SCRAPER_PROXY_URL }}
          TESSERACT_PATH: /usr/bin/tesseract
        run: python main.py --check

      - name: Run prepare (OCR + caption prep)
        env:
          TESSERACT_PATH: /usr/bin/tesseract
        run: python main.py --prepare

      - name: Commit and push newly downloaded media
        # Must happen before --publish: the Graph API fetches images from
        # MEDIA_PUBLIC_BASE_URL itself, so a raw.githubusercontent.com URL only
        # works once the file has actually been pushed. (Requires this repo to
        # be public, or MEDIA_PUBLIC_BASE_URL to point at a different public host.)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add database/app.db downloads/
          git diff --staged --quiet || git commit -m "Automated scan: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase && git push

      - name: Run publish (post due items to the destination account)
        env:
          IG_DEST_ACCESS_TOKEN: ${{ secrets.IG_DEST_ACCESS_TOKEN }}
          IG_DEST_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_DEST_BUSINESS_ACCOUNT_ID }}
          MEDIA_PUBLIC_BASE_URL: ${{ secrets.MEDIA_PUBLIC_BASE_URL }}
        run: python main.py --publish

      # Comment auto-reply (--reply) is a separate, not-yet-shipped pipeline
      # (still uncommitted locally as of 2026-07-10) -- deliberately not wired
      # in here yet. Add it back once it's been live-tested on its own.

      - name: Commit updated publish status
        run: |
          git add database/app.db
          git diff --staged --quiet || git commit -m "Automated publish: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase && git push
