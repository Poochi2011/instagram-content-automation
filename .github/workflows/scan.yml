name: Instagram scan

on:
  schedule:
    - cron: "0 * * * *" # hourly — edit this to change polling frequency
  workflow_dispatch: {} # adds a "Run workflow" button in the Actions tab

permissions:
  contents: write # needed to commit the updated database/downloads back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tesseract OCR
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore Instagram session cache
        uses: actions/cache@v4
        with:
          path: config/sessions
          key: instagram-session-${{ github.repository }}

      - name: Seed Instagram session from secret (first run / cache-miss fallback)
        # A brand-new login from GitHub's IP is the case most likely to trigger
        # Instagram's "unfamiliar device" challenge, which a headless runner can't
        # answer. INSTAGRAM_SESSION_B64 carries a session file created by logging
        # in once, interactively, from a residential IP — see README for how to
        # generate it. Only used if the cache above didn't already restore a
        # session (cache wins once it exists, since it reflects the most recent
        # successful run).
        env:
          INSTAGRAM_SESSION_B64: ${{ secrets.INSTAGRAM_SESSION_B64 }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
        run: |
          if [ -n "$INSTAGRAM_SESSION_B64" ] && [ -n "$INSTAGRAM_USERNAME" ]; then
            mkdir -p config/sessions
            session_path="config/sessions/${INSTAGRAM_USERNAME}.session"
            if [ ! -f "$session_path" ]; then
              echo "$INSTAGRAM_SESSION_B64" | base64 -d > "$session_path"
              echo "Seeded session for $INSTAGRAM_USERNAME from secret (no cached session found)."
            else
              echo "Cached session already present for $INSTAGRAM_USERNAME; not overwriting with secret."
            fi
          fi

      - name: Run check (scrape new posts)
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          TESSERACT_PATH: /usr/bin/tesseract
        run: python main.py --check

      - name: Run prepare (OCR + caption prep)
        env:
          TESSERACT_PATH: /usr/bin/tesseract
        run: python main.py --prepare

      - name: Commit and push newly downloaded media
        # Must happen before --publish: the Graph API fetches images from
        # MEDIA_PUBLIC_BASE_URL itself, so a raw.githubusercontent.com URL only
        # works once the file has actually been pushed. (Requires this repo to
        # be public, or MEDIA_PUBLIC_BASE_URL to point at a different public host.)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add database/app.db downloads/
          git diff --staged --quiet || git commit -m "Automated scan: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Run publish (post due items to the destination account)
        env:
          IG_DEST_ACCESS_TOKEN: ${{ secrets.IG_DEST_ACCESS_TOKEN }}
          IG_DEST_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_DEST_BUSINESS_ACCOUNT_ID }}
          MEDIA_PUBLIC_BASE_URL: ${{ secrets.MEDIA_PUBLIC_BASE_URL }}
        run: python main.py --publish

      - name: Commit updated publish status
        run: |
          git add database/app.db
          git diff --staged --quiet || git commit -m "Automated publish: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase && git push
