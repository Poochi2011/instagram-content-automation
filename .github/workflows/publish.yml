name: Instagram publish

# Posts up to 6 items per day, one per scheduled slot, only during daytime.
# Times below are UTC (GitHub cron is always UTC); the comment shows the
# equivalent India Standard Time (IST = UTC+5:30), which is the intended
# audience-facing schedule. Six evenly-spaced daytime slots:
#
#   03:30 UTC = 09:00 IST
#   06:00 UTC = 11:30 IST
#   08:30 UTC = 14:00 IST
#   11:00 UTC = 16:30 IST
#   13:30 UTC = 19:00 IST
#   16:00 UTC = 21:30 IST
#
# max_publish_per_cycle=2 + max_publish_per_day=6 (config.json) mean each run
# posts up to two due items, with the whole day capped at six.
on:
  schedule:
    - cron: "30 3 * * *"
    - cron: "0 6 * * *"
    - cron: "30 8 * * *"
    - cron: "0 11 * * *"
    - cron: "30 13 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch: {} # adds a "Run workflow" button in the Actions tab

permissions:
  contents: write # needed to commit the updated publish status back to the repo

# Prevent a long-running/backed-up run from overlapping the next slot and
# double-posting; a queued run supersedes an in-progress one.
concurrency:
  group: instagram-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run publish (post due items to the destination account)
        env:
          IG_DEST_ACCESS_TOKEN: ${{ secrets.IG_DEST_ACCESS_TOKEN }}
          IG_DEST_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_DEST_BUSINESS_ACCOUNT_ID }}
          MEDIA_PUBLIC_BASE_URL: ${{ secrets.MEDIA_PUBLIC_BASE_URL }}
        run: python main.py --publish

      - name: Commit updated publish status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add database/app.db
          git diff --staged --quiet || git commit -m "Automated publish: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase && git push
